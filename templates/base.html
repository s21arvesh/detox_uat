<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% endblock title %} | DETOX GAMING</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>

  <body>

<style>
/* Navbar */
.navbar-brand {
  font-weight: bold;
  font-size: 1.5rem;
  color: #667eea !important;
}

.nav-link {
  font-weight: 500;
  transition: color 0.3s ease;
}

.nav-link:hover {
  color: #667eea !important;
}

/* Dropdown */
.dropdown-menu {
  border: none;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  border-radius: 12px;
  margin-top: 10px;
  width: 300px;
  padding: 1px;
  background: white !important;
}

/* FIXED ITEM */
.dropdown-item {
  display: flex !important;
  align-items: center !important;
  gap: 10px !important;
  border-radius: 8px;
  margin: 2px 8px;
  padding: 8px 12px !important;
  transition: all 0.3s ease;
  text-decoration: none !important;
  color: #212529 !important;
  min-height: 44px !important;
  background: transparent !important;
  border: 1px solid transparent !important;
}

.dropdown-item:hover {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
  color: white !important;
  transform: translateX(5px);
  border: 1px solid transparent !important;
}

.dropdown-item:hover small {
  color: #ddd !important;
}

/* Icon */
.game-icon {
  width: 28px !important;
  height: 28px !important;
  border-radius: 50% !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  flex-shrink: 0 !important;
  margin: 0 !important;
}

.game-icon i {
  font-size: 12px !important;
}

/* Text */
.text-content {
  display: flex !important;
  flex-direction: column !important;
  line-height: 1.1 !important;
  align-items: flex-start !important;
  justify-content: center !important;
  margin: 0 !important;
  padding: 0 !important;
}

.text-content strong {
  font-size: 13px !important;
  font-weight: 600 !important;
  margin: 0 !important;
  padding: 0 !important;
  line-height: 1.2 !important;
}

.text-content small {
  font-size: 11px !important;
  color: #6c757d !important;
  margin: 0 !important;
  padding: 0 !important;
  line-height: 1.1 !important;
}

.dropdown-divider {
  margin: 6px 0;
}

/* Enhanced Navbar Styling */
.navbar {
  background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #2d1b69 100%) !important;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  border-bottom: 2px solid #ff6b6b;
  padding: 1rem 0;
  transition: all 0.3s ease;
  position: relative;
  z-index: 1000;
}

.navbar-brand {
  color: white !important;
  font-weight: 700;
  font-size: 1.5rem;
  text-decoration: none;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
}

.navbar-brand:hover {
  color: #ff6b6b !important;
  transform: translateY(-2px);
  text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
}

.navbar-brand i {
  font-size: 1.8rem;
  animation: pulse 2s infinite;
}

.navbar-nav .nav-link {
  color: rgba(255, 255, 255, 0.9) !important;
  font-weight: 500;
  margin: 0 0.5rem;
  padding: 0.5rem 1rem !important;
  border-radius: 8px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.navbar-nav .nav-link::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 107, 107, 0.3), transparent);
  transition: left 0.5s ease;
}

.navbar-nav .nav-link:hover::before {
  left: 100%;
}

.navbar-nav .nav-link:hover {
  color: white !important;
  background: rgba(255, 107, 107, 0.2);
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
}

.navbar-nav .nav-link i {
  margin-right: 0.5rem;
  transition: transform 0.3s ease;
}

.navbar-nav .nav-link:hover i {
  transform: scale(1.2);
}

/* Dropdown Styling */
.dropdown-menu {
  background: linear-gradient(135deg, #0f0f1e, #1a1a2e) !important;
  border: 2px solid #ff6b6b;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  margin-top: 0.5rem;
  animation: slideDown 0.3s ease-out;
  position: absolute;
  z-index: 999;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.dropdown-item {
  color: rgba(255, 255, 255, 0.9) !important;
  padding: 0.75rem 1rem;
  transition: all 0.3s ease;
  border-radius: 8px;
  margin: 0.25rem 0.5rem;
}

.dropdown-item:hover {
  background: rgba(255, 107, 107, 0.3) !important;
  color: white !important;
  transform: translateX(5px);
}

.dropdown-toggle {
  color: rgba(255, 255, 255, 0.9) !important;
  font-weight: 500;
  margin: 0 0.5rem;
  padding: 0.5rem 1rem !important;
  border-radius: 8px;
  transition: all 0.3s ease;
}

.dropdown-toggle:hover {
  color: white !important;
  background: rgba(255, 107, 107, 0.2);
  transform: translateY(-2px);
}

/* Mobile Responsive */
.navbar-toggler {
  border: 2px solid #ff6b6b;
  padding: 0.25rem 0.5rem;
}

.navbar-toggler:focus {
  box-shadow: 0 0 0 0.25rem rgba(255, 107, 107, 0.25);
}

.navbar-toggler-icon {
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255, 255, 255, 0.9)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
}
</style>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">

    <a class="navbar-brand" href="/home/">
      <i class="fas fa-gamepad me-2"></i>DETOX GAMING
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">

      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <li class="nav-item">
          <a class="nav-link" href="/esports">
            <i class="fas fa-trophy me-1"></i>ESPORTS
          </a>
        </li>

        <!-- DROPDOWN -->
        <li class="nav-item dropdown">
          <div class="nav-link d-flex align-items-center dropdown-toggle"
               role="button"
               data-bs-toggle="dropdown"
               aria-expanded="false"
               style="cursor: pointer;">

            <i class="fas fa-crosshairs me-2"></i>
            <span>FOCUS</span>

          </div>

          <ul class="dropdown-menu">

            <!-- BGMI -->
            <li>
              <a class="dropdown-item" href="/bgmi">
                <div class="game-icon bg-warning">
                  <i class="fas fa-bullseye text-white"></i>
                </div>
                <div class="text-content">
                  <strong>BGMI</strong>
                  <small>Battle Grounds Mobile India</small>
                </div>
              </a>
            </li>

            <!-- VALORANT -->
            <li>
              <a class="dropdown-item" href="/valorant">
                <div class="game-icon bg-danger">
                  <i class="fas fa-shield-alt text-white"></i>
                </div>
                <div class="text-content">
                  <strong>VALORANT</strong>
                  <small>Tactical FPS</small>
                </div>
              </a>
            </li>

            <!-- COD -->
            <li>
              <a class="dropdown-item" href="/cod_m">
                <div class="game-icon bg-success">
                  <i class="fas fa-gun text-white"></i>
                </div>
                <div class="text-content">
                  <strong>CALL OF DUTY MOBILE</strong>
                  <small>Action FPS</small>
                </div>
              </a>
            </li>

            <li><hr class="dropdown-divider"></li>

            <!-- CONTENT -->
            <li>
              <a class="dropdown-item" href="/content_creation">
                <div class="game-icon bg-info">
                  <i class="fas fa-video text-white"></i>
                </div>
                <div class="text-content">
                  <strong>CONTENT CREATION</strong>
                  <small>Streaming & Media</small>
                </div>
              </a>
            </li>

          </ul>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/join_us">
            <i class="fas fa-user-plus me-1"></i>JOIN US
          </a>
        </li>

      </ul>

      <!-- SEARCH -->
      <form class="d-flex me-3">
        <input class="form-control me-2" type="search" placeholder="Search games, players..." 
          style="border-radius: 20px; border: 2px solid #e9ecef;">
        <button class="btn btn-primary" type="submit"
          style="border-radius: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none;">
          <i class="fas fa-search"></i>
        </button>
      </form>

      <!-- LOGOUT BUTTON -->
      <a class="nav-link" href="/logout" style="color: #dc3545 !important; font-weight: 600; border: 2px solid #dc3545; border-radius: 8px; padding: 8px 16px;">
        <i class="fas fa-sign-out-alt me-1"></i>LOGOUT
      </a>

    </div>
  </div>
</nav>

{% block body %}{% endblock body %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
